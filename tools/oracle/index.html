<!doctype html>
<html lang="es">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>易 — Oráculo del I-Ching</title>
    <meta name="description" content="Consulta al Libro de los Cambios. Un test cinemático con anime.js." />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,400&family=Noto+Serif+SC:wght@400;500;700&family=JetBrains+Mono:wght@400;500&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../shared/styles/tokens.css" />
    <link rel="stylesheet" href="../../shared/styles/base.css" />
    <link rel="stylesheet" href="../../shared/styles/components.css" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body data-tool="oracle">
    <!-- Grano global como overlay fijo -->
    <div class="grain" aria-hidden="true"></div>

    <!-- Filtros SVG globales (manchas de tinta) -->
    <svg class="svg-defs" aria-hidden="true">
      <defs>
        <filter id="ink-blur" x="-20%" y="-20%" width="140%" height="140%">
          <feGaussianBlur in="SourceGraphic" stdDeviation="2" />
          <feTurbulence type="fractalNoise" baseFrequency="0.9" numOctaves="2" seed="3" result="noise" />
          <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" />
        </filter>
      </defs>
    </svg>

    <main id="oracle">
      <!-- 1. INTRO ---------------------------------------------------- -->
      <section id="intro" class="oracle-section is-active" data-section="intro">
        <div class="ink-stains" aria-hidden="true">
          <span class="ink-stain ink-stain--1"></span>
          <span class="ink-stain ink-stain--2"></span>
          <span class="ink-stain ink-stain--3"></span>
        </div>
        <div class="intro__content">
          <h1 class="intro__glyph" aria-label="Yi — el Libro de los Cambios">易</h1>
          <p class="intro__subtitle">
            <span data-split>Pregúntale al Libro de los Cambios</span>
          </p>
          <p class="intro__hint">三千年的回答 · tres mil años de respuestas</p>
          <button class="btn btn--primary intro__cta" data-action="goto" data-target="question">
            <span>Empezar consulta</span>
            <span class="btn__shimmer" aria-hidden="true"></span>
          </button>
        </div>
      </section>

      <!-- 2. QUESTION ------------------------------------------------- -->
      <section id="question" class="oracle-section" data-section="question">
        <div class="question__content">
          <p class="question__prompt"><span data-split>¿Qué te trae aquí?</span></p>
          <div class="question__breath" aria-hidden="true">
            <span class="breath-circle"></span>
          </div>
          <label class="question__field">
            <textarea
              id="question-input"
              rows="3"
              maxlength="300"
              placeholder="Formula tu pregunta con sinceridad…"
              autocomplete="off"
            ></textarea>
            <span class="question__underline" aria-hidden="true"></span>
          </label>

          <div class="question__method" role="tablist" aria-label="Método de consulta">
            <button class="method-option" role="tab" aria-selected="true" data-method="coins">
              <span class="method-option__glyph" aria-hidden="true">錢</span>
              <span class="method-option__name">Monedas</span>
              <span class="method-option__hint">Tres monedas, seis tiradas. Rápido.</span>
            </button>
            <button class="method-option" role="tab" aria-selected="false" data-method="stalks">
              <span class="method-option__glyph" aria-hidden="true">蓍</span>
              <span class="method-option__name">Varitas de milenrama</span>
              <span class="method-option__hint">Cincuenta varitas, ritual lento. Tradicional.</span>
            </button>
          </div>

          <button class="btn btn--primary question__cta" data-action="throw" disabled>
            <span class="question__cta-label">Lanzar las monedas</span>
          </button>
        </div>
      </section>

      <!-- 3. THROW ---------------------------------------------------- -->
      <section id="throw" class="oracle-section" data-section="throw">
        <header class="throw__header">
          <p class="throw__counter">
            Tirada <span id="throw-current">1</span> <span class="muted">de</span> 6
          </p>
          <p class="throw__question" id="throw-question-echo"></p>
        </header>

        <div class="throw__stage">
          <div class="throw__visual" id="throw-visual" aria-live="polite">
            <!-- Inyectado: .throw__coins o .throw__stalks según método -->
          </div>
          <div class="throw__hexagram-wrap">
            <div class="throw__hexagram" id="throw-hexagram"></div>
          </div>
        </div>

        <button class="btn btn--ghost throw__cta" id="throw-cta" data-action="throw-next">
          Lanzar
        </button>
      </section>

      <!-- 4. REVEAL --------------------------------------------------- -->
      <section id="reveal" class="oracle-section" data-section="reveal">
        <div class="reveal__content">
          <div class="reveal__halo" aria-hidden="true"></div>
          <div class="reveal__hexagrams">
            <figure class="reveal__hexagram" id="reveal-primary">
              <div class="reveal__hexagram-svg" data-role="primary-hexagram"></div>
              <figcaption class="reveal__caption">Primario</figcaption>
            </figure>
            <div class="reveal__arrow" id="reveal-arrow" hidden>
              <svg viewBox="0 0 80 24" aria-hidden="true">
                <line x1="4" y1="12" x2="68" y2="12" />
                <polyline points="62,5 76,12 62,19" fill="none" />
              </svg>
              <span>se transforma en</span>
            </div>
            <figure class="reveal__hexagram" id="reveal-secondary" hidden>
              <div class="reveal__hexagram-svg" data-role="secondary-hexagram"></div>
              <figcaption class="reveal__caption">Secundario</figcaption>
            </figure>
          </div>
          <div class="reveal__meta" id="reveal-meta">
            <p class="reveal__number" id="reveal-number">—</p>
            <h2 class="reveal__name">
              <span id="reveal-name-cn" class="reveal__name-cn"></span>
              <span id="reveal-name-py" class="reveal__name-py"></span>
            </h2>
            <p class="reveal__meaning" id="reveal-meaning"></p>
            <p class="reveal__trigrams" id="reveal-trigrams"></p>
          </div>
          <button class="btn btn--primary reveal__cta" data-action="goto" data-target="reading">
            Leer interpretación
          </button>
        </div>
      </section>

      <!-- 5. READING -------------------------------------------------- -->
      <section id="reading" class="oracle-section oracle-section--scroll" data-section="reading">
        <div class="reading__progress" aria-hidden="true">
          <span class="reading__progress-bar" id="reading-progress-bar"></span>
        </div>

        <article class="reading__article">
          <header class="reading__header">
            <p class="reading__question" id="reading-question-echo"></p>
            <div class="reading__hex-mini" id="reading-hex-mini"></div>
            <h2 class="reading__title">
              <span id="reading-name-cn"></span>
              <small id="reading-name-py"></small>
              <em id="reading-meaning"></em>
            </h2>
          </header>

          <section class="reading__block reading__block--judgment" data-block>
            <h3 class="reading__block-title">El Dictamen</h3>
            <blockquote class="reading__quote" id="reading-judgment"></blockquote>
          </section>

          <section class="reading__block reading__block--image" data-block>
            <h3 class="reading__block-title">La Imagen</h3>
            <blockquote class="reading__quote" id="reading-image"></blockquote>
          </section>

          <section class="reading__block reading__block--reading" data-block>
            <h3 class="reading__block-title">La Lectura</h3>
            <p id="reading-text"></p>
          </section>

          <section class="reading__block reading__block--mutating" id="reading-mutating-block" data-block hidden>
            <h3 class="reading__block-title">Líneas Mutables</h3>
            <ol class="reading__lines" id="reading-mutating-list"></ol>
          </section>

          <section class="reading__block reading__block--secondary" id="reading-secondary-block" data-block hidden>
            <h3 class="reading__block-title">Hexagrama Secundario</h3>
            <p class="reading__secondary-name" id="reading-secondary-name"></p>
            <p id="reading-secondary-text"></p>
          </section>

          <footer class="reading__footer">
            <button class="btn btn--primary" data-action="goto" data-target="outro">
              Cerrar la consulta
            </button>
          </footer>
        </article>
      </section>

      <!-- 6. OUTRO ---------------------------------------------------- -->
      <section id="outro" class="oracle-section" data-section="outro">
        <div class="outro__content">
          <div class="outro__hexagram" id="outro-hexagram"></div>
          <div class="outro__particles" id="outro-particles" aria-hidden="true"></div>
          <p class="outro__farewell">
            <span data-split>El cambio es la única constante.</span>
          </p>
          <button class="btn btn--primary outro__cta" data-action="restart">
            Nueva consulta
          </button>
        </div>
      </section>
    </main>

    <script type="module" src="./js/main.js"></script>
  </body>
</html>
